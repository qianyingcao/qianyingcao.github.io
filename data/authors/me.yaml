role: Assistant Professor of Mechanical Engineering
bio: |
  Dr. Qianying Cao is an Assistant Professor in the Department of Mechanical Engineering at Rochester Institute of Technology. Her research focuses on developing scientific machine learning methods to solve complex scientific and engineering problems,
  such as structural behavior prediction, system identification, AI-aided design of metamaterials for additive manufacturing, and data-driven modeling for climate and engineering systems.
  She has published 28 peer-reviewed research articles, including journal publications in Nature Machine Intelligence, Nature Communications, and Advanced Materials. 

