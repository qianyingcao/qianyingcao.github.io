# Navigation Links
#   To link a homepage widget, specify the URL as a hash `#` followed by the filename of the
  #     desired widget in your `content/home/` folder.
  #   The weight parameter defines the order that the links will appear in.

main:
  - name: Bio
    url: /#bio
    weight: 10
  - name: Research
    url: /#projects
    weight: 20
  - name: Publications
    url: /#papers
    weight: 30
  - name: Openings
    url: /openings/
    weight: 40
  - name: News
    url: /#news/
    weight: 50
  - name: Contact
    url: /#contact
    weight: 60

